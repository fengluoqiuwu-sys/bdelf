_doc: Schedule template (unified token-budget scheme)
name: prototype
variant: fast
# Token budget drives max_steps (raw data tokens; BDELF/ELF 4:1 is loss mix only).
target_tokens: 160000000
# Warmup as a fraction of the derived max_steps.
warmup_ratio: 0.1
min_lr_ratio: 0.1
# Absolute step intervals (not ratios).
eval_step: 500
save_step: 2000
snapshot_step: 10000
log_plot_step: 100
resume: true
seed: 42
# Hidden Linear weights use Muon; others stay AdamW.
# Checkpoints are saved under <run-name>-muon (e.g. ar-100m-fast-muon).
use_muon: true
