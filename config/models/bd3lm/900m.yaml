_doc: Block Diffusion LM ~870M params (28 layers x 1536 dim, diffusion block 32)

name: bd3lm-900m
tokenizer: gpt2
diffusion_block_size: 32
n_layer: 28
n_head: 16
n_embd: 1536
dropout: 0.1
attn_backend: flex
sampling_eps_min: 0.001
sampling_eps_max: 1.0
fix_bos: true

sampling:
  num_steps: 5000
  sampler: semi_ar
  first_hitting: true
  nucleus_p: 1.0
