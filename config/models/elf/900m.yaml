_doc: ELF-L ~652M (32 layers x 1280 dim; maps to repo 900m slot, no CFG)

name: elf-900m
tokenizer: t5-small
max_seq_len: 1024
encoder_model_name: t5-small
text_encoder_dim: 512
bottleneck_dim: 128
n_layer: 32
n_head: 16
n_embd: 1280
dropout: 0.0
num_time_tokens: 4
num_model_mode_tokens: 4
self_cond_prob: 0.5
latent_mean: 0.0
latent_std: 0.2
denoiser_p_mean: -1.5
denoiser_p_std: 0.8
denoiser_noise_scale: 2.0
decoder_prob: 0.2
decoder_p_mean: 0.8
decoder_p_std: 0.8
decoder_noise_scale: 5.0
t_eps: 0.05
time_schedule: logit_normal

sampling:
  sampling_method: sde
  num_sampling_steps: 64
  sde_gamma: 1.0
  time_schedule: logit_normal
  temperature: 0.0
